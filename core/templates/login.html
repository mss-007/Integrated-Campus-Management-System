{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* 🔥 ANTI-FLASH FIX 🔥 */
.preload * {
    -webkit-transition: none !important;
    -moz-transition: none !important;
    -ms-transition: none !important;
    -o-transition: none !important;
    transition: none !important;
}

/* BACKGROUND */
body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #e0ecff, #2563eb, #1e3a8a);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
    transition: background 0.6s ease;
}

/* FLOAT EFFECT */
body::before{
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
    top: -100px;
    left: -100px;
    animation: float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(20px);}
}

/* LOGIN BOX */
.login-box{
    width: 400px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    text-align: center;
    transition: background 0.4s ease, box-shadow 0.4s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* LOGO */
.logo{
    width: 70px;
    margin-bottom: 10px;
    object-fit: contain;
}

/* TITLE */
.title{
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 5px;
}

.subtitle{
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 20px;
}

/* INPUTS */
.form-control{
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 10px 15px;
    transition: 0.3s;
}

.form-control:focus{
    background: rgba(255,255,255,0.35);
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
    outline: none;
    color: white;
}

.form-control::placeholder{
    color: #e0e7ff;
}

/* BUTTON */
.btn-login{
    background: white;
    color: #1e3a8a;
    font-weight: 600;
    border-radius: 10px;
    transition: 0.3s;
}

.btn-login:hover{
    background: #e0ecff;
    transform: scale(1.04);
}

/* THEME TOGGLE BUTTON */
.theme-toggle-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    z-index: 100;
}

.theme-toggle-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(1.1);
}

/* ERROR */
.alert{
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 10px;
}

/* FOOTER */
.login-footer{
    position: absolute;
    bottom: 12px;
    width: 100%;
    text-align: center;
    font-size: 13px;
    color: #cbd5f5;
    letter-spacing: 0.5px;
    opacity: 0.9;
}


/* 🔥 DARK MODE STYLES 🔥 */
body.dark-mode {
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
}

body.dark-mode::before {
    background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 60%);
}

body.dark-mode .login-box {
    background: rgba(15, 23, 42, 0.6); /* Deeper, darker glass */
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 255, 255, 0.05);
}

body.dark-mode .form-control {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid #334155;
    color: #f8fafc;
}

body.dark-mode .form-control:focus {
    background: rgba(0, 0, 0, 0.6);
    border-color: #3b82f6;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
}

body.dark-mode .form-control::placeholder {
    color: #94a3b8;
}

body.dark-mode .btn-login {
    background: #3b82f6;
    color: white;
}

body.dark-mode .btn-login:hover {
    background: #2563eb;
}

body.dark-mode .theme-toggle-btn {
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid #334155;
    color: #fbbf24; /* Sun color */
}

body.dark-mode .theme-toggle-btn:hover {
    background: rgba(30, 41, 59, 0.8);
}

body.dark-mode .login-footer {
    color: #64748b;
}
</style>

</head>

<body class="preload">

<script>
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
    }
    
    // Remove preload to allow animations to run smoothly after initial paint
    window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            document.body.classList.remove('preload');
        }, 50);
    });
</script>

<button class="theme-toggle-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
    <i id="themeIcon" class="bi bi-moon-stars-fill fs-5"></i>
</button>

<div class="login-box animate__animated animate__fadeInUp">

    <img src="{% static 'logo.gif' %}" class="logo" alt="College Logo" onerror="this.style.display='none'">

    <div class="title">
        Nallamuthu Gounder Mahalingam College
    </div>

    <div class="subtitle">
        Database Login
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert text-center mb-3 animate__animated animate__shakeX">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input name="username" class="form-control mb-3" placeholder="Username" required>
        
        <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-login w-100 p-2">Login</button>

    </form>

</div>

<footer class="login-footer">
    © 2026 NGM College. All rights reserved.
</footer>

<script>
    // Set initial icon based on local storage
    document.addEventListener("DOMContentLoaded", function() {
        const isDark = document.body.classList.contains('dark-mode');
        updateThemeIcon(isDark);
    });

    // Toggle function shared with the main dashboard
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        updateThemeIcon(isDark);
    }

    function updateThemeIcon(isDark) {
        const icon = document.getElementById('themeIcon');
        if (isDark) {
            icon.className = 'bi bi-sun-fill fs-5'; // Changes to a sun in dark mode
        } else {
            icon.className = 'bi bi-moon-stars-fill fs-5'; // Changes to a moon in light mode
        }
    }
</script>

</body>
</html>
